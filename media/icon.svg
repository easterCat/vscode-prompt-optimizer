<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bg)"/>

  <!-- Alchemy Flask -->
  <g transform="translate(64, 68)">
    <!-- Flask neck (narrow top) -->
    <rect x="-6" y="-40" width="12" height="22" rx="3" ry="3" fill="#ffffff"/>
    <!-- Flask rim -->
    <rect x="-9" y="-42" width="18" height="5" rx="2.5" ry="2.5" fill="#ffffff"/>
    <!-- Flask body (round bottom) -->
    <ellipse cx="0" cy="4" rx="28" ry="26" fill="#ffffff"/>
  </g>

  <!-- Sparkle (magic/transformation symbol) -->
  <g transform="translate(90, 30)" fill="#FFD700">
    <polygon points="0,-10 3,-3 10,0 3,3 0,10 -3,3 -10,0 -3,-3"/>
  </g>

  <!-- Small decorative dots -->
  <circle cx="36" cy="96" r="3" fill="#FFD700" opacity="0.7"/>
  <circle cx="100" cy="80" r="2" fill="#FFD700" opacity="0.5"/>
</svg>
